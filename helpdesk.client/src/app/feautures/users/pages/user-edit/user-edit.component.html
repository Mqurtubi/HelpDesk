<div class="p-6">
  <div class="max-w-4xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Edit User</h1>
        <p class="text-sm text-slate-500 mt-1">
          Perbarui informasi user pada sistem HelpDesk
        </p>
      </div>

      <button type="button"
              (click)="goBack()"
              class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50">
        Back
      </button>
    </div>

    <div *ngIf="errorMessage"
         class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage"
         class="mb-4 rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
      {{ successMessage }}
    </div>

    <div *ngIf="pageLoading"
         class="rounded-2xl bg-white shadow-sm border border-slate-200 p-8 text-center text-slate-500">
      Loading data...
    </div>

    <form *ngIf="!pageLoading"
          [formGroup]="form"
          (ngSubmit)="submitForm()"
          class="rounded-2xl bg-white shadow-sm border border-slate-200 p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Full Name
          </label>
          <input type="text"
                 formControlName="fullName"
                 placeholder="Masukkan nama lengkap"
                 class="w-full rounded-xl border px-4 py-3 outline-none"
                 [class.border-red-400]="fullName?.touched && fullName?.invalid"
                 [class.border-slate-300]="!(fullName?.touched && fullName?.invalid)" />
          <p *ngIf="fullName?.touched && fullName?.errors?.['required']" class="mt-2 text-sm text-red-600">
            Full name wajib diisi.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Email
          </label>
          <input type="email"
                 formControlName="email"
                 placeholder="Masukkan email"
                 class="w-full rounded-xl border px-4 py-3 outline-none"
                 [class.border-red-400]="email?.touched && email?.invalid"
                 [class.border-slate-300]="!(email?.touched && email?.invalid)" />
          <p *ngIf="email?.touched && email?.errors?.['required']" class="mt-2 text-sm text-red-600">
            Email wajib diisi.
          </p>
          <p *ngIf="email?.touched && email?.errors?.['email']" class="mt-2 text-sm text-red-600">
            Format email tidak valid.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Password Baru
          </label>
          <input type="password"
                 formControlName="password"
                 placeholder="Kosongkan jika tidak ingin mengubah password"
                 class="w-full rounded-xl border px-4 py-3 outline-none"
                 [class.border-red-400]="password?.touched && password?.invalid"
                 [class.border-slate-300]="!(password?.touched && password?.invalid)" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Department
          </label>
          <select formControlName="departementId" class="w-full rounded-xl border px-4 py-3 outline-none bg-white">
            <option [ngValue]="null">Select Department</option>
            <option *ngFor="let department of departments" [ngValue]="department.id">
              {{ department.name }}
            </option>
          </select>
          <p *ngIf="departementId?.touched && departementId?.errors?.['required']" class="mt-2 text-sm text-red-600">
            Department wajib dipilih.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Role
          </label>
          <select formControlName="roleId" class="w-full rounded-xl border px-4 py-3 outline-none bg-white">
            <option [ngValue]="null">Select Role</option>
            <option *ngFor="let role of roles" [ngValue]="role.id">
              {{ role.name }}
            </option>
          </select>
          <p *ngIf="roleId?.touched && roleId?.errors?.['required']" class="mt-2 text-sm text-red-600">
            Role wajib dipilih.
          </p>
        </div>
      </div>

      <div class="mt-8 flex items-center justify-end gap-3">
        <button type="button"
                (click)="goBack()"
                class="px-5 py-3 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50">
          Cancel
        </button>

        <button type="submit"
                [disabled]="loading"
                class="px-5 py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 disabled:opacity-60">
          {{ loading ? 'Updating...' : 'Update User' }}
        </button>
      </div>
    </form>
  </div>
</div>
