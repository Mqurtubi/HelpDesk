      <a routerLink="/users/create" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl shadow" hred>
        + Buat User
      </a>
    </div>

      <div *ngIf="loading" class="bg-white p-4 rounded-xl shadow text-slate-600 mb-4">
        Loading data ticket...
      </div>

      <div *ngIf="errorMessage" class="bg-red-100 text-red-700 p-4 rounded-xl mb-4">
        {{ errorMessage }}
      </div>

      <div *ngIf="!loading && !errorMessage && users.length === 0" class="bg-white p-4 rounded-xl shadow text-slate-600">
        Belum ada ticket.
      </div>

      <div *ngIf="!loading && !errorMessage && users.length > 0" class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 border-b">
            <tr>
              <th class="text-center px-4 py-3 font-semibold text-slate-600">ID</th>
              <th class="text-center px-4 py-3 font-semibold text-slate-600">User</th>
              <th class="text-center px-4 py-3 font-semibold text-slate-600">Department</th>
              <th class="text-center px-4 py-3 font-semibold text-slate-600">Role</th>
              <th class="text-center px-4 py-3 font-semibold text-slate-600">Aksi</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of paginationUsers" class="border-b hover:bg-slate-50">
              <td class=" py-3">{{ user.id }}</td>
              <td class=" py-3">
                <div class="font-semibold text-slate-800">{{ user.fullName }}</div>
                <div class="text-slate-500 text-xs mt-1">{{ user.email }}</div>
              </td>
              <td class="px-4 py-3">
                <span class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">
                  {{ user.departmentName }}
                </span>
              </td>
              <td class="px-4 py-3">
                <span class="px-3 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700">
                  {{ user.roleName }}
                </span>
              </td>
              <td class="px-4 py-3">
                <a [routerLink]="['/users', user.id]" class="text-blue-600 font-semibold">
                  Detail
                </a>
              </td>
            </tr>
          </tbody>
        </table>
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 px-4 py-4 border-t bg-slate-50">
          <div class="text-sm text-slate-600">
            Halaman <span class="font-semibold">{{ currentPage }}</span>
            dari <span class="font-semibold">{{ totalPages }}</span>
          </div>

          <div class="flex flex-wrap items-center gap-2">
            <button type="button"
                    (click)="previousPage()"
                    [disabled]="currentPage === 1"
                    class="px-3 py-2 rounded-lg border bg-white text-slate-700 disabled:opacity-50">
              Previous
            </button>

            <button type="button"
                    *ngFor="let page of pageNumbers"
                    (click)="goToPage(page)"
                    [class.bg-blue-600]="page === currentPage"
                    [class.text-white]="page === currentPage"
                    class="px-3 py-2 rounded-lg border bg-white text-slate-700">
              {{ page }}
            </button>

            <button type="button"
                    (click)="nextPage()"
                    [disabled]="currentPage === totalPages"
                    class="px-3 py-2 rounded-lg border bg-white text-slate-700 disabled:opacity-50">
              Next
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
