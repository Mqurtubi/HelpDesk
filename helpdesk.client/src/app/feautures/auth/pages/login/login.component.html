<div class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow p-8">
    <div class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-slate-800">Login HelpDesk</h1>
      <p class="text-slate-500 mt-2">Masuk untuk mengakses aplikasi</p>
    </div>

    <form (ngSubmit)="submitForm()" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
        <input type="email"
               name="email"
               [(ngModel)]="formData.email"
               class="w-full border border-slate-300 rounded-xl px-4 py-3"
               placeholder="Masukkan email"
               required />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
        <input type="password"
               name="password"
               [(ngModel)]="formData.password"
               class="w-full border border-slate-300 rounded-xl px-4 py-3"
               placeholder="Masukkan password"
               required />
      </div>

      <div *ngIf="errorMessage" class="text-sm text-red-600">
        {{ errorMessage }}
      </div>

      <button type="submit"
              [disabled]="loading"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-3 rounded-xl disabled:opacity-60">
        {{ loading ? 'Loading...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
