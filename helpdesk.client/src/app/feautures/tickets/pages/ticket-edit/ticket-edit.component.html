<div class="min-h-screen bg-slate-100 p-6">
  <div class="max-w-3xl mx-auto">
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-slate-800">Edit Ticket</h1>
      <p class="text-slate-500 mt-1">Ubah data ticket yang sudah ada</p>
    </div>

    <div *ngIf="loadingTicket" class="bg-white rounded-2xl shadow p-6 text-slate-600">
      Loading data ticket...
    </div>

    <div *ngIf="!loadingTicket"  class="bg-white rounded-2xl shadow p-6">
      <form (ngSubmit)="submitForm()" [formGroup]="form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Title
          </label>
          <input type="text"
                 formControlName="title"
                 class="w-full border border-slate-300 rounded-xl px-4 py-3"
                 [class.border-red-400]="title?.touched && title?.invalid"
                 [class.border-slate-300]="!(title?.touched && title?.invalid)"
                 placeholder="Masukkan judul ticket" />
          <p *ngIf="title?.touched && title?.errors?.['required']"
             class="mt-2 text-sm text-red-600">
                title wajib diisi.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Description
          </label>
          <textarea formControlName="description"
                    rows="5"
                    class="w-full border border-slate-300 rounded-xl px-4 py-3"
                    [class.border-red-400]="description?.touched && description?.invalid"
                    [class.border-slate-300]="!(description?.touched && description?.invalid)"
                    placeholder="Masukkan deskripsi masalah"></textarea>
          <p *ngIf="description?.touched && description?.errors?.['required']"
            class="mt-2 text-sm text-red-600">
            description wajib diisi.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Priority
          </label>
          <select formControlName="priority"
                  class="w-full border border-slate-300 rounded-xl px-4 py-3"
                  [class.border-red-400]="priority?.touched && priority?.invalid"
                  [class.border-slate-300]="!(priority?.touched && priority?.invalid)">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>

        <div *ngIf="errorMessage" class="bg-red-100 text-red-700 p-3 rounded-xl">
          {{ errorMessage }}
        </div>

        <div class="flex gap-3">
          <button type="submit"
                  [disabled]="loading"
                  class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl shadow disabled:opacity-50">
            {{ loading ? 'Menyimpan...' : 'Simpan Perubahan' }}
          </button>

          <a [routerLink]="['/tickets', ticketId]"
             class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-5 py-3 rounded-xl">
            Batal
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
