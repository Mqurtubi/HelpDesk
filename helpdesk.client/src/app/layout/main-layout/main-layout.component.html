<div class="min-h-screen bg-slate-100 flex">
  <!-- Overlay mobile -->
  <div *ngIf="sidebarOpen"
       class="fixed inset-0 bg-black/40 z-30 lg:hidden"
       (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="fixed lg:static inset-y-0 left-0 z-40 w-72 bg-slate-900 text-white transform transition-transform duration-300"
         [class.translate-x-0]="sidebarOpen"
         [class.-translate-x-full]="!sidebarOpen"
         [class.lg:translate-x-0]="true">
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
      <h1 class="text-xl font-bold tracking-wide">HelpDesk</h1>
    </div>

    <nav class="p-4 space-y-2">
      <a routerLink="/dashboard"
         routerLinkActive="bg-slate-800 text-white"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition"
         (click)="closeSidebar()">
        <span>📊</span>
        <span>Dashboard</span>
      </a>

      <a routerLink="/tickets"
         routerLinkActive="bg-slate-800 text-white"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition"
         (click)="closeSidebar()">
        <span>🎫</span>
        <span>Tickets</span>
      </a>

      <a routerLink="/tickets/create"
         routerLinkActive="bg-slate-800 text-white"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition"
         (click)="closeSidebar()">
        <span>➕</span>
        <span>Create Ticket</span>
      </a>
      <button type="button"
              (click)="logout()"
              class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl">
        Logout
      </button>
    </nav>
  </aside>

  <!-- Content area -->
  <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
    <!-- Topbar -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button type="button"
                class="lg:hidden inline-flex items-center justify-center w-10 h-10 rounded-xl border border-slate-200 hover:bg-slate-100"
                (click)="toggleSidebar()">
          ☰
        </button>

        <div>
          <h2 class="text-lg font-semibold text-slate-800">HelpDesk Panel</h2>
          <p class="text-xs text-slate-500">Ticket Management System</p>
        </div>
        <div class="hidden sm:block text-right" *ngIf="authService.getCurrentUser() as user">
          <p class="text-sm font-semibold text-slate-700">{{ user.fullName }}</p>
          <p class="text-xs text-slate-500">{{ user.roleName }}</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden sm:block text-right">
          <p class="text-sm font-semibold text-slate-700">Admin</p>
          <p class="text-xs text-slate-500">Administrator</p>
        </div>

        <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">
          A
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-4 lg:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
